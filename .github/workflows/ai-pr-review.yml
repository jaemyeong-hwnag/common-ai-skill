name: AI PR Review & Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  # ── Job 1: Branch name must include issue ID ─────────────────────────────
  branch-name-check:
    name: Validate branch name (issue ID required)
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name contains issue ID
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.head_ref }}
        run: |
          # release/* branches use version as identifier — exempt
          if echo "$BRANCH" | grep -qE '^release/'; then
            echo "Release branch — issue ID check skipped: $BRANCH"
            exit 0
          fi

          # All work branches must match: <type>/<number>-<description>
          if echo "$BRANCH" | grep -qE '^(feature|fix|hotfix|improve|chore)/[0-9]+-[a-z0-9]'; then
            echo "Branch name valid: $BRANCH"
            exit 0
          fi

          {
            echo "## Branch Name Violation"
            echo ""
            echo "Branch \`${BRANCH}\` does not include a GitHub issue ID."
            echo ""
            echo "**Required format:** \`<type>/<issue-id>-<description>\`"
            echo "| Type | Target | Example |"
            echo "|------|--------|---------|"
            echo "| \`feature\` | develop | \`feature/27-add-new-skill\` |"
            echo "| \`fix\` | develop | \`fix/31-broken-installer\` |"
            echo "| \`hotfix\` | main | \`hotfix/33-npm-publish-fail\` |"
            echo "| \`improve\` | develop | \`improve/29-token-efficiency\` |"
            echo "| \`chore\` | develop | \`chore/30-update-ci\` |"
            echo ""
            echo "Rename the branch and re-open the PR."
          } > /tmp/branch_violation.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/branch_violation.md

          # Status check failure blocks merge — no need for gh pr review --request-changes
          # (GITHUB_TOKEN cannot request changes on a PR it created via auto-pr.yml)
          exit 1

  # ── Job 2: Skill abstraction check — core project principle ─────────────
  skill-abstraction-check:
    name: Skill abstraction & principle check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed SKILL.md files
        id: detect
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep 'SKILL\.md' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if [ -z "$FILES" ]; then
            echo "has_skills=false" >> $GITHUB_OUTPUT
          else
            echo "has_skills=true" >> $GITHUB_OUTPUT
          fi

      - name: Check abstraction compliance
        id: abstraction
        if: steps.detect.outputs.has_skills == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKILL_FILES: ${{ steps.detect.outputs.files }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          CRITERIA = """
          You are reviewing SKILL.md files for abstraction and format compliance.
          All output must be in English.

          HARD rules — always reject if violated:
          1. No specific language, library, framework, tool, command, or file path.
          2. Rules describe WHAT must be true — not HOW to achieve it.
          3. Single responsibility — one skill, one concern.

          IMPORTANT — what is NOT a HARD violation:
          - Domain-level abstract concepts are allowed even if they sound technical.
            Examples that are ACCEPTABLE: "agent", "sub-agent", "orchestrator",
            "message", "embedding", "retrieval", "coverage target", "evaluator",
            "adapter", "port", "layer", "inbound", "outbound", "correlation ID".
          - These are architectural or domain vocabulary, NOT references to a
            specific language, library, framework, tool, or command.
          - Numeric thresholds (e.g., "80%") are acceptable when they define a
            measurable goal, not a technology-specific constant.
          - Only flag a term as HARD violation if it names a concrete product,
            library, language, CLI command, or file path (e.g., "Jest", "Python",
            "npm test", "src/index.ts").

          STRUCTURAL rules — evaluated against AI prompt engineering research:
          Current convention: single <constraints> block, single <criteria> block,
          no WHY explanations inside <constraints>.
          A structural change is APPROVED only if it is demonstrably more optimal or
          efficient for an AI reader, supported by prompt engineering research — e.g.:
          - tagged sections reducing hallucination (structured prompting research)
          - XML/semantic markup improving instruction-following accuracy
          - chain-of-thought or role-separation patterns from published papers
          - compression or positional encoding findings improving token efficiency
          If unsure, REJECT.

          LANGUAGE rules — evaluated against AI comprehension research:
          Default language is English. A non-English or non-natural-language format
          (structured notation, symbolic representation, formal encoding) is APPROVED
          only if research or evidence shows it produces measurably better AI
          comprehension, instruction-following, or token efficiency than English prose.
          Human readability is NOT a criterion — AI optimality is.
          If unsure, English is correct. REJECT non-English natural language with no
          research justification.

          Respond ONLY with JSON:
          {
            "passed": true/false,
            "violations": [
              {
                "file": "path/to/SKILL.md",
                "line": "exact line or snippet",
                "reason": "explanation",
                "rule": "hard|structural|language"
              }
            ],
            "summary": "one sentence in English"
          }
          If no violations, violations must be empty and passed must be true.
          """

          files = os.environ["SKILL_FILES"].strip().split("\n")
          contents = {}
          for f in files:
              if f and os.path.exists(f):
                  contents[f] = open(f).read()

          if not contents:
              result = {"passed": True, "violations": [], "summary": "No skill files to check."}
          else:
              skills_text = "\n\n".join(f"### {k}\n{v}" for k, v in contents.items())

              payload = {
                "model": "gpt-4o-mini",
                "messages": [
                  {"role": "system", "content": CRITERIA},
                  {"role": "user", "content": f"Check these SKILL.md files:\n\n{skills_text[:8000]}"}
                ],
                "response_format": {"type": "json_object"}
              }

              req = urllib.request.Request(
                "https://models.inference.ai.azure.com/chat/completions",
                data=json.dumps(payload).encode(),
                headers={
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "Content-Type": "application/json"
                }
              )
              with urllib.request.urlopen(req) as resp:
                  raw = json.loads(resp.read())
              result = json.loads(raw["choices"][0]["message"]["content"])

          passed = str(result.get("passed", False)).lower()
          summary = result.get("summary", "")
          violations = result.get("violations", [])

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"passed={passed}\n")
              f.write(f"summary={summary}\n")

          # Write violations to file to avoid shell backtick injection
          v_text = "\n".join(
              f"- [{v.get('rule','hard').upper()}] `{v['file']}`: {v['reason']} (`{v.get('line','')}`)"
              for v in violations
          ) if violations else "None"
          with open("/tmp/violations.txt", "w") as f:
              f.write(v_text)

          print(f"passed={passed}, violations={len(violations)}")
          EOF

      - name: Post result and formally reject if violated
        if: steps.detect.outputs.has_skills == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PASSED="${{ steps.abstraction.outputs.passed }}"
          SUMMARY="${{ steps.abstraction.outputs.summary }}"

          if [ "$PASSED" = "true" ]; then
            ICON="✅"; STATUS="Passed"
          else
            ICON="❌"; STATUS="Violations detected"
          fi

          {
            echo "## Abstraction Check $ICON"
            echo ""
            echo "**Result:** $STATUS"
            echo "**Summary:** $SUMMARY"
            echo ""
            echo "**Violations:**"
            cat /tmp/violations.txt
            echo ""
            echo "---"
            echo "*HARD: no tool/lang specifics · What-not-How · single responsibility*"
            echo "*STRUCTURAL: format changes approved only if justified by prompt engineering research*"
            echo "*LANGUAGE: English default · non-English approved only if measurably better for AI*"
          } > /tmp/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment.md

          if [ "$PASSED" != "true" ]; then
            # Status check failure blocks merge — no need for gh pr review --request-changes
            # (GITHUB_TOKEN cannot request changes on a PR it created via auto-pr.yml)
            exit 1
          fi

  # ── Job 3: AI code review + auto-merge ──────────────────────────────────
  ai-review:
    name: AI code review
    if: always()
    needs: [branch-name-check, skill-abstraction-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: AI Review via GitHub Models
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          diff = open("pr.diff").read()[:8000]  # token limit guard

          payload = {
            "model": "gpt-4o-mini",
            "messages": [
              {
                "role": "system",
                "content": (
                  "You are a code reviewer. Analyze the diff and respond ONLY with JSON:\n"
                  "{\"approved\": true/false, \"summary\": \"one sentence\", \"issues\": [\"...\"]}\n\n"
                  "Approve when: code quality acceptable, no security issues, changes coherent.\n"
                  "Reject when: security vulnerabilities, broken logic, new features without tests.\n"
                  "IMPORTANT: SKILL.md files are abstract interface definitions (not code) — "
                  "they intentionally have no tests. Always approve SKILL.md-only changes "
                  "if the content is coherent and free of security issues.\n"
                  "All output must be in English."
                )
              },
              {
                "role": "user",
                "content": f"Review this PR diff:\n\n{diff}"
              }
            ],
            "response_format": {"type": "json_object"}
          }

          req = urllib.request.Request(
            "https://models.inference.ai.azure.com/chat/completions",
            data=json.dumps(payload).encode(),
            headers={
              "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              "Content-Type": "application/json"
            }
          )

          with urllib.request.urlopen(req) as resp:
            result = json.loads(resp.read())

          content = json.loads(result["choices"][0]["message"]["content"])
          approved = str(content.get("approved", False)).lower()
          summary  = content.get("summary", "")
          issues   = content.get("issues", [])

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"approved={approved}\n")
            f.write(f"summary={summary}\n")
            issues_text = "\n".join(f"- {i}" for i in issues) if issues else "None"
            f.write(f"issues={issues_text}\n")

          print(f"approved={approved}, summary={summary}")
          EOF

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_CHECK: ${{ needs.branch-name-check.result }}
          ABSTRACTION_CHECK: ${{ needs.skill-abstraction-check.result }}
        run: |
          APPROVED="${{ steps.review.outputs.approved }}"
          SUMMARY="${{ steps.review.outputs.summary }}"
          ISSUES="${{ steps.review.outputs.issues }}"

          if [ "$APPROVED" = "true" ]; then
            ICON="✅"; STATUS="Approved"
          else
            ICON="❌"; STATUS="Changes requested"
          fi

          {
            echo "## AI Code Review $ICON"
            echo ""
            echo "**Result:** $STATUS"
            echo "**Summary:** $SUMMARY"
            echo ""
            echo "**Issues:**"
            echo "$ISSUES"

            # Warn if upstream checks failed — auto-merge will be blocked
            if [ "$BRANCH_CHECK" = "failure" ] || [ "$ABSTRACTION_CHECK" = "failure" ]; then
              echo ""
              echo "> **⚠️ Auto-merge blocked** — upstream check(s) failed:"
              [ "$BRANCH_CHECK" = "failure" ]      && echo "> - Branch name validation"
              [ "$ABSTRACTION_CHECK" = "failure" ]  && echo "> - Skill abstraction check"
            fi

            echo ""
            echo "---"
            echo "*Analyzed by [GitHub Models](https://github.com/marketplace/models) (gpt-4o-mini)*"
          } > /tmp/comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment.md

      - name: Auto-merge if approved (rebase / merge commit by branch type)
        if: |
          steps.review.outputs.approved == 'true' &&
          needs.skill-abstraction-check.result != 'failure' &&
          needs.branch-name-check.result != 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.head_ref }}
        run: |
          # Mark as ready if still draft
          gh pr ready "${{ github.event.pull_request.number }}" 2>/dev/null || true

          # release/* and hotfix/* → merge commit (preserves release boundary in history)
          # all other branches   → rebase  (linear graph, no merge bubbles)
          if echo "$BRANCH" | grep -qE '^(release|hotfix)/'; then
            STRATEGY="--merge"
          else
            STRATEGY="--rebase"
          fi

          gh pr merge "${{ github.event.pull_request.number }}" \
            --auto \
            $STRATEGY \
            --delete-branch

          echo "Auto-merge ($STRATEGY) enabled for $BRANCH"

name: AI PR Review & Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  skill-abstraction-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed SKILL.md files
        id: detect
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep 'SKILL\.md' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if [ -z "$FILES" ]; then
            echo "has_skills=false" >> $GITHUB_OUTPUT
          else
            echo "has_skills=true" >> $GITHUB_OUTPUT
          fi

      - name: Check abstraction compliance
        id: abstraction
        if: steps.detect.outputs.has_skills == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          CRITERIA = """
          You are reviewing SKILL.md files for abstraction compliance. All output must be in English.

          HARD rules — always reject if violated:
          1. No specific language, library, framework, tool, command, or file path mentioned anywhere.
          2. Rules describe WHAT must be true — not HOW to achieve it.
          3. Single responsibility — one skill covers exactly one concern.

          STRUCTURAL rules — evaluated against AI prompt engineering research:
          The current convention is: single <constraints> block, single <criteria> block, no WHY
          explanations inside <constraints>.
          A structural change (new XML tags, multiple blocks, added context/explanations, different
          section layout) is APPROVED only if it is more optimal or efficient for an AI reader based
          on established prompt engineering principles and research — for example:
          - structured prompting research showing tagged sections reduce hallucination
          - chain-of-thought or role-separation patterns from published papers
          - XML/semantic markup findings showing improved instruction-following
          - retrieval or compression research showing the new format reduces token waste
          If a structural change cannot be justified by such evidence, REJECT it.
          When unsure, REJECT.

          Respond ONLY with JSON:
          {
            "passed": true/false,
            "violations": [
              {
                "file": "path/to/SKILL.md",
                "line": "exact line or snippet",
                "reason": "explanation",
                "rule": "hard|structural"
              }
            ],
            "summary": "one sentence in English"
          }
          If no violations, violations must be empty and passed must be true.
          """

          files = os.environ["SKILL_FILES"].strip().split("\n")
          contents = {}
          for f in files:
              if f and os.path.exists(f):
                  contents[f] = open(f).read()

          if not contents:
              result = {"passed": True, "violations": [], "summary": "No skill files to check."}
          else:
              skills_text = "\n\n".join(f"### {k}\n{v}" for k, v in contents.items())

              payload = {
                "model": "gpt-4o-mini",
                "messages": [
                  {"role": "system", "content": CRITERIA},
                  {"role": "user", "content": f"Check these SKILL.md files:\n\n{skills_text[:8000]}"}
                ],
                "response_format": {"type": "json_object"}
              }

              req = urllib.request.Request(
                "https://models.inference.ai.azure.com/chat/completions",
                data=json.dumps(payload).encode(),
                headers={
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "Content-Type": "application/json"
                }
              )
              with urllib.request.urlopen(req) as resp:
                  raw = json.loads(resp.read())
              result = json.loads(raw["choices"][0]["message"]["content"])

          passed = str(result.get("passed", False)).lower()
          summary = result.get("summary", "")
          violations = result.get("violations", [])

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"passed={passed}\n")
              f.write(f"summary={summary}\n")
              v_text = "\n".join(
                  f"- [{v.get('rule','hard').upper()}] `{v['file']}`: {v['reason']} (`{v.get('line','')}`)"
                  for v in violations
              ) if violations else "None"
              f.write(f"violations={v_text}\n")

          print(f"passed={passed}, violations={len(violations)}")
          EOF
        env:
          SKILL_FILES: ${{ steps.detect.outputs.files }}

      - name: Post abstraction check result
        if: steps.detect.outputs.has_skills == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PASSED="${{ steps.abstraction.outputs.passed }}"
          SUMMARY="${{ steps.abstraction.outputs.summary }}"
          VIOLATIONS="${{ steps.abstraction.outputs.violations }}"

          if [ "$PASSED" = "true" ]; then
            ICON="✅"
            STATUS="Passed"
          else
            ICON="❌"
            STATUS="Violations detected"
          fi

          gh pr comment ${{ github.event.pull_request.number }} --body "## Abstraction Check $ICON

**Result:** $STATUS
**Summary:** $SUMMARY

**Violations:**
$VIOLATIONS

---
*HARD: no tool/lang specifics · What-not-How · single responsibility*
*STRUCTURAL: format changes approved only if more optimal/efficient for AI readers per prompt engineering research*"

  ai-review:
    runs-on: ubuntu-latest
    needs: skill-abstraction-check
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: AI Review via GitHub Models
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          diff = open("pr.diff").read()[:8000]  # token limit guard

          payload = {
            "model": "gpt-4o-mini",
            "messages": [
              {
                "role": "system",
                "content": (
                  "You are a code reviewer. Analyze the diff and respond ONLY with JSON:\n"
                  "{\"approved\": true/false, \"summary\": \"one sentence\", \"issues\": [\"...\"]}\n\n"
                  "Approve when: code quality acceptable, no security issues, changes coherent.\n"
                  "Reject when: security vulnerabilities, broken logic, new features without tests.\n"
                  "All output must be in English."
                )
              },
              {
                "role": "user",
                "content": f"Review this PR diff:\n\n{diff}"
              }
            ],
            "response_format": {"type": "json_object"}
          }

          req = urllib.request.Request(
            "https://models.inference.ai.azure.com/chat/completions",
            data=json.dumps(payload).encode(),
            headers={
              "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              "Content-Type": "application/json"
            }
          )

          with urllib.request.urlopen(req) as resp:
            result = json.loads(resp.read())

          content = json.loads(result["choices"][0]["message"]["content"])
          approved = str(content.get("approved", False)).lower()
          summary  = content.get("summary", "")
          issues   = content.get("issues", [])

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"approved={approved}\n")
            f.write(f"summary={summary}\n")
            issues_text = "\n".join(f"- {i}" for i in issues) if issues else "None"
            f.write(f"issues={issues_text}\n")

          print(f"approved={approved}, summary={summary}")
          EOF

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPROVED="${{ steps.review.outputs.approved }}"
          SUMMARY="${{ steps.review.outputs.summary }}"
          ISSUES="${{ steps.review.outputs.issues }}"

          if [ "$APPROVED" = "true" ]; then
            ICON="✅"
            STATUS="Approved"
          else
            ICON="❌"
            STATUS="Changes requested"
          fi

          gh pr comment ${{ github.event.pull_request.number }} --body "## AI Code Review $ICON

**Result:** $STATUS
**Summary:** $SUMMARY

**Issues:**
$ISSUES

---
*Analyzed by [GitHub Models](https://github.com/marketplace/models) (gpt-4o-mini)*"

      - name: Enable auto-merge if approved
        if: |
          steps.review.outputs.approved == 'true' &&
          needs.skill-abstraction-check.result != 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --auto \
            --squash \
            --delete-branch

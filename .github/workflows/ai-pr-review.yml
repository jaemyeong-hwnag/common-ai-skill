name: AI PR Review & Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  skill-abstraction-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed SKILL.md files
        id: detect
        run: |
          FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep 'SKILL\.md' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if [ -z "$FILES" ]; then
            echo "has_skills=false" >> $GITHUB_OUTPUT
          else
            echo "has_skills=true" >> $GITHUB_OUTPUT
          fi

      - name: Check abstraction compliance
        id: abstraction
        if: steps.detect.outputs.has_skills == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          CRITERIA = """
          Abstraction rules for SKILL.md files:
          1. No specific language, library, framework, tool, command, or file path
          2. Rules describe WHAT must be true — not HOW to achieve it
          3. No explanations of WHY inside <constraints> (e.g. "— reason" after a rule is a violation)
          4. Only one <constraints> block per skill
          5. Only <constraints> and <criteria> XML tags allowed (not <instruction>)
          6. Single responsibility — one skill, one concern

          Respond ONLY with JSON:
          {
            "passed": true/false,
            "violations": [
              {"file": "path/to/SKILL.md", "line": "...", "reason": "..."}
            ],
            "summary": "one sentence"
          }
          If no violations, violations array must be empty and passed must be true.
          """

          files = os.environ["SKILL_FILES"].strip().split("\n")
          contents = {}
          for f in files:
              if f and os.path.exists(f):
                  contents[f] = open(f).read()

          if not contents:
              result = {"passed": True, "violations": [], "summary": "No skill files to check."}
          else:
              skills_text = "\n\n".join(f"### {k}\n{v}" for k, v in contents.items())

              payload = {
                "model": "gpt-4o-mini",
                "messages": [
                  {"role": "system", "content": CRITERIA},
                  {"role": "user", "content": f"Check these SKILL.md files:\n\n{skills_text[:8000]}"}
                ],
                "response_format": {"type": "json_object"}
              }

              req = urllib.request.Request(
                "https://models.inference.ai.azure.com/chat/completions",
                data=json.dumps(payload).encode(),
                headers={
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "Content-Type": "application/json"
                }
              )
              with urllib.request.urlopen(req) as resp:
                  raw = json.loads(resp.read())
              result = json.loads(raw["choices"][0]["message"]["content"])

          passed = str(result.get("passed", False)).lower()
          summary = result.get("summary", "")
          violations = result.get("violations", [])

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"passed={passed}\n")
              f.write(f"summary={summary}\n")
              v_text = "\n".join(
                  f"- `{v['file']}`: {v['reason']} (`{v.get('line','')}`)"
                  for v in violations
              ) if violations else "없음"
              f.write(f"violations={v_text}\n")

          print(f"passed={passed}, violations={len(violations)}")
          EOF
        env:
          SKILL_FILES: ${{ steps.detect.outputs.files }}

      - name: Post abstraction check result
        if: steps.detect.outputs.has_skills == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PASSED="${{ steps.abstraction.outputs.passed }}"
          SUMMARY="${{ steps.abstraction.outputs.summary }}"
          VIOLATIONS="${{ steps.abstraction.outputs.violations }}"

          if [ "$PASSED" = "true" ]; then
            ICON="✅"
            STATUS="통과"
          else
            ICON="❌"
            STATUS="위반 감지"
          fi

          gh pr comment ${{ github.event.pull_request.number }} --body "## 추상화 검증 $ICON

**결과:** $STATUS
**요약:** $SUMMARY

**위반 항목:**
$VIOLATIONS

---
*추상화 원칙: 특정 도구/언어 금지 · What만 기술 · \`<constraints>\`/\`<criteria>\` 포맷 · 단일 책임*"

  ai-review:
    runs-on: ubuntu-latest
    needs: skill-abstraction-check
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr.diff

      - name: AI Review via GitHub Models
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          diff = open("pr.diff").read()[:8000]  # token limit guard

          payload = {
            "model": "gpt-4o-mini",
            "messages": [
              {
                "role": "system",
                "content": (
                  "You are a code reviewer. Analyze the diff and respond ONLY with JSON:\n"
                  "{\"approved\": true/false, \"summary\": \"one sentence\", \"issues\": [\"...\"]}\n\n"
                  "Approve when: code quality acceptable, no security issues, changes coherent.\n"
                  "Reject when: security vulnerabilities, broken logic, new features without tests."
                )
              },
              {
                "role": "user",
                "content": f"Review this PR diff:\n\n{diff}"
              }
            ],
            "response_format": {"type": "json_object"}
          }

          req = urllib.request.Request(
            "https://models.inference.ai.azure.com/chat/completions",
            data=json.dumps(payload).encode(),
            headers={
              "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              "Content-Type": "application/json"
            }
          )

          with urllib.request.urlopen(req) as resp:
            result = json.loads(resp.read())

          content = json.loads(result["choices"][0]["message"]["content"])
          approved = str(content.get("approved", False)).lower()
          summary  = content.get("summary", "")
          issues   = content.get("issues", [])

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"approved={approved}\n")
            f.write(f"summary={summary}\n")
            issues_text = "\n".join(f"- {i}" for i in issues) if issues else "없음"
            f.write(f"issues={issues_text}\n")

          print(f"approved={approved}, summary={summary}")
          EOF

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPROVED="${{ steps.review.outputs.approved }}"
          SUMMARY="${{ steps.review.outputs.summary }}"
          ISSUES="${{ steps.review.outputs.issues }}"

          if [ "$APPROVED" = "true" ]; then
            ICON="✅"
            STATUS="승인"
          else
            ICON="❌"
            STATUS="변경 요청"
          fi

          gh pr comment ${{ github.event.pull_request.number }} --body "## AI 코드 리뷰 $ICON

**결과:** $STATUS
**요약:** $SUMMARY

**발견된 이슈:**
$ISSUES

---
*[GitHub Models](https://github.com/marketplace/models) (gpt-4o-mini) 자동 분석*"

      - name: Enable auto-merge if approved
        if: |
          steps.review.outputs.approved == 'true' &&
          needs.skill-abstraction-check.result != 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --auto \
            --squash \
            --delete-branch

name: Release Post-merge

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["AI PR Review & Auto-merge"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-release:
    name: Detect release merge
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.detect.outputs.is_release }}
      release_branch: ${{ steps.detect.outputs.release_branch }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Detect release merge
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_MESSAGE: ${{ github.event.head_commit.message }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            BRANCH=$(echo "$PUSH_MESSAGE" | grep -oE 'release/[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          elif [ "$EVENT_NAME" = "workflow_run" ]; then
            if [ "$WORKFLOW_CONCLUSION" != "success" ]; then
              echo "Upstream workflow did not succeed — skipping."
              echo "is_release=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            BRANCH="$WORKFLOW_HEAD_BRANCH"
            if ! echo "$BRANCH" | grep -qE '^release/[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "Upstream workflow was not for a release branch: $BRANCH"
              echo "is_release=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            git fetch origin main:refs/remotes/origin/main
            if ! git merge-base --is-ancestor "$WORKFLOW_HEAD_SHA" origin/main; then
              echo "Release branch commit is not on main yet — skipping."
              echo "is_release=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            echo "Unsupported event: $EVENT_NAME"
            echo "is_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -z "$BRANCH" ]; then
            echo "Not a release merge — skipping."
            echo "is_release=false" >> $GITHUB_OUTPUT
          else
            VERSION=$(echo "$BRANCH" | sed 's|release/||')
            echo "Release branch detected: $BRANCH"
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "release_branch=$BRANCH" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

  back-merge-to-develop:
    name: Back-merge main to develop
    runs-on: ubuntu-latest
    needs: detect-release
    if: needs.detect-release.outputs.is_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into develop
        env:
          RELEASE_BRANCH: ${{ needs.detect-release.outputs.release_branch }}
        run: |
          git fetch origin
          git checkout develop
          git pull origin develop
          git merge --no-ff origin/main -m "chore: back-merge ${RELEASE_BRANCH} to develop"
          git push origin develop
          echo "Back-merged main -> develop after ${RELEASE_BRANCH}"

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: detect-release
    if: needs.detect-release.outputs.is_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract changelog section
        id: release
        env:
          VERSION: ${{ needs.detect-release.outputs.version }}
        run: |
          python3 - <<'PYEOF'
          import re, os

          version = os.environ['VERSION']
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()

          pattern = rf'## \[{re.escape(version)}\].*?(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          notes = match.group(0).strip() if match else f'## [{version}]\n\nRelease {version}'

          with open('/tmp/release_notes.md', 'w') as f:
              f.write(notes)
          print(f"Extracted notes for v{version} ({len(notes)} chars)")
          PYEOF

      - name: Create GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.detect-release.outputs.version }}
        run: |
          # Skip if release already exists
          if gh release view "v${VERSION}" > /dev/null 2>&1; then
            echo "Release v${VERSION} already exists — skipping."
            exit 0
          fi
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release_notes.md \
            --target main
          echo "GitHub Release v${VERSION} published"

name: Release Post-merge

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  back-merge-to-develop:
    name: Back-merge main to develop
    runs-on: ubuntu-latest
    steps:
      - name: Detect release merge
        id: detect
        run: |
          # Read the merge commit message from the push event
          MSG="${{ github.event.head_commit.message }}"
          BRANCH=$(echo "$MSG" | grep -oE 'release/[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [ -z "$BRANCH" ]; then
            echo "Not a release merge — skipping."
            echo "is_release=false" >> $GITHUB_OUTPUT
          else
            echo "Release branch detected: $BRANCH"
            echo "is_release=true"  >> $GITHUB_OUTPUT
            echo "release_branch=$BRANCH" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.detect.outputs.is_release == 'true'
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        if: steps.detect.outputs.is_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into develop
        if: steps.detect.outputs.is_release == 'true'
        env:
          RELEASE_BRANCH: ${{ steps.detect.outputs.release_branch }}
        run: |
          git fetch origin
          git checkout develop
          git pull origin develop
          git merge --no-ff origin/main -m "chore: back-merge ${RELEASE_BRANCH} to develop"
          git push origin develop
          echo "Back-merged main -> develop after ${RELEASE_BRANCH}"

  publish-github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Detect release merge
        id: detect
        run: |
          MSG="${{ github.event.head_commit.message }}"
          BRANCH=$(echo "$MSG" | grep -oE 'release/[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [ -z "$BRANCH" ]; then
            echo "Not a release merge — skipping."
            echo "is_release=false" >> $GITHUB_OUTPUT
          else
            VERSION=$(echo "$BRANCH" | sed 's|release/||')
            echo "is_release=true"   >> $GITHUB_OUTPUT
            echo "version=$VERSION"  >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.detect.outputs.is_release == 'true'
        with:
          ref: main
          fetch-depth: 0

      - name: Extract changelog section
        id: release
        if: steps.detect.outputs.is_release == 'true'
        env:
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          python3 - <<'PYEOF'
          import re, os

          version = os.environ['VERSION']
          with open('CHANGELOG.md', 'r') as f:
              content = f.read()

          pattern = rf'## \[{re.escape(version)}\].*?(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          notes = match.group(0).strip() if match else f'## [{version}]\n\nRelease {version}'

          with open('/tmp/release_notes.md', 'w') as f:
              f.write(notes)
          print(f"Extracted notes for v{version} ({len(notes)} chars)")
          PYEOF

      - name: Create GitHub Release (idempotent)
        if: steps.detect.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.detect.outputs.version }}
        run: |
          # Skip if release already exists
          if gh release view "v${VERSION}" > /dev/null 2>&1; then
            echo "Release v${VERSION} already exists — skipping."
            exit 0
          fi
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/release_notes.md \
            --target main
          echo "GitHub Release v${VERSION} published"


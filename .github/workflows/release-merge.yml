name: Release Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # ── Job 1: Enable auto-merge when release PR is opened/updated ──────────
  enable-auto-merge:
    name: Enable auto-merge (merge commit)
    if: |
      github.event.action != 'closed' &&
      startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge with merge commit strategy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --auto \
            --merge
          echo "Auto-merge (merge commit) enabled for PR #${{ github.event.pull_request.number }} (${{ github.head_ref }} → main)"

  # ── Job 2: Back-merge main → develop after release is merged ────────────
  back-merge-to-develop:
    name: Back-merge main → develop
    if: |
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge main into develop
        env:
          RELEASE_BRANCH: ${{ github.head_ref }}
        run: |
          git fetch origin

          git checkout develop
          git pull origin develop

          git merge --no-ff origin/main \
            -m "chore: back-merge ${RELEASE_BRANCH} to develop"

          git push origin develop
          echo "Back-merged main → develop after ${RELEASE_BRANCH} was released"

      - name: Comment on merged PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" --body \
            "**Release complete.**
- Merged into \`main\` ✅
- Back-merged into \`develop\` ✅"

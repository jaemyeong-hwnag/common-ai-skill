name: Auto-create PR on Branch Push

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'improve/**'
      - 'chore/**'
      - 'release/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve base branch, title, and draft mode
        id: meta
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          case "$BRANCH" in
            feature/*)  BASE="develop"; TYPE="feat";    DRAFT="true" ;;
            fix/*)      BASE="develop"; TYPE="fix";     DRAFT="true" ;;
            improve/*)  BASE="develop"; TYPE="improve"; DRAFT="true" ;;
            chore/*)    BASE="develop"; TYPE="chore";   DRAFT="true" ;;
            release/*)  BASE="main";    TYPE="release"; DRAFT="false" ;;
            hotfix/*)   BASE="main";    TYPE="hotfix";  DRAFT="false" ;;
            *)
              echo "No PR rule for branch: $BRANCH"
              exit 0
              ;;
          esac

          # Strip type prefix and leading issue-id from slug for title
          DESC=$(echo "$BRANCH" \
            | sed "s|^[^/]*/[0-9]*-||" \
            | sed "s|^[^/]*/||" \
            | tr '-' ' ')
          TITLE="${TYPE}: ${DESC}"

          echo "base=$BASE"   >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "draft=$DRAFT" >> $GITHUB_OUTPUT
          echo "PR: $TITLE ($BRANCH -> $BASE) draft=$DRAFT"

      - name: Create PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          BASE: ${{ steps.meta.outputs.base }}
          TITLE: ${{ steps.meta.outputs.title }}
          DRAFT: ${{ steps.meta.outputs.draft }}
        run: |
          # Idempotent: skip if PR already exists for this branch (any state)
          EXISTING=$(gh pr list \
            --head "$BRANCH" \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $BRANCH — skipping."
            exit 0
          fi

          # release/* and hotfix/* → ready immediately; others → draft
          DRAFT_FLAG=""
          [ "$DRAFT" = "true" ] && DRAFT_FLAG="--draft"

          if ! gh pr create \
            --head "$BRANCH" \
            --base "$BASE" \
            --title "$TITLE" \
            --body-file ".github/pull_request_template.md" \
            $DRAFT_FLAG 2>&1 | tee /tmp/pr_create.log; then
            if grep -q "already exists" /tmp/pr_create.log; then
              echo "PR already exists (race condition) — skipping."
              exit 0
            fi
            cat /tmp/pr_create.log
            exit 1
          fi

          echo "PR created: \"$TITLE\" ($BRANCH -> $BASE, draft=$DRAFT)"

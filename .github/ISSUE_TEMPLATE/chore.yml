name: Chore / Documentation
description: Configuration, tooling, housekeeping, or documentation changes
labels: ["chore"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be changed and why?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which files or areas are affected?
    validations:
      required: false
